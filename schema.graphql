scalar FieldSet

directive @external on FIELD_DEFINITION
directive @provides(fields: FieldSet) on FIELD_DEFINITION
directive @key(fields: FieldSet) repeatable on OBJECT | INTERFACE
directive @extends on OBJECT | INTERFACE

scalar _Any

type _Service {
  sdl: String
}

type User @extends @key(fields: "id") {
  id: ID! @external
  posts(after: String, limit: Int = 20): PostConnection!
  liked(postId: ID!): Boolean!
}

type Post @key(fields: "id") {
  id: ID!
  author: User! @provides(fields: "id")
  body: String!
  media: [Media!]!
  createdAt: String!
  likeCount: Int!
  likedByMe: Boolean!
  commentCount: Int!
  repostCount: Int!
  repostOf: PostReference
  comments(after: String, limit: Int = 20): CommentConnection!
}

type PostReference {
  id: ID!
  author: User! @provides(fields: "id")
  body: String!
  media: [Media!]!
  createdAt: String!
  likeCount: Int!
  likedByMe: Boolean!
  commentCount: Int!
  repostCount: Int!
}

type Comment {
  id: ID!
  postId: ID!
  author: User! @provides(fields: "id")
  body: String!
  createdAt: String!
}

type CommentEdge {
  node: Comment!
  cursor: String!
}

type CommentConnection {
  edges: [CommentEdge!]!
  pageInfo: PageInfo!
}

type AdminContentMetrics {
  totalPosts: Int!
  hiddenPosts: Int!
  postsLast24h: Int!
  totalLikes: Int!
}

enum AdminPostStatus {
  ACTIVE
  HIDDEN
}

enum AdminPostHiddenReason {
  ADMIN_HIDDEN
  USER_DEACTIVATED
}

type AdminPost {
  id: ID!
  author: User! @provides(fields: "id")
  body: String!
  media: [Media!]!
  createdAt: String!
  likeCount: Int!
  likedByMe: Boolean!
  commentCount: Int!
  repostCount: Int!
  repostOf: PostReference
  status: AdminPostStatus!
  hiddenAt: String
  hiddenReason: AdminPostHiddenReason
}

type AdminPostEdge {
  node: AdminPost!
  cursor: String!
}

type AdminPostConnection {
  edges: [AdminPostEdge!]!
  pageInfo: PageInfo!
}

type Media {
  type: String!
  url: String!
}

type PostEdge {
  node: Post!
  cursor: String!
}

type PostConnection {
  edges: [PostEdge!]!
  pageInfo: PageInfo!
}

type PageInfo {
  endCursor: String
  hasNextPage: Boolean!
}

union _Entity = User | Post

type Query {
  feedHome(after: String, limit: Int = 20): PostConnection!
  post(id: ID!): Post
  adminContentMetrics: AdminContentMetrics!
  adminRecentPosts(limit: Int = 10): [AdminPost!]!
  adminPosts(query: String, status: AdminPostStatus, after: String, limit: Int = 20): AdminPostConnection!
}

type Mutation {
  createPost(body: String!, mediaKeys: [String!], mediaAssetIds: [ID!]): Post!
  likePost(id: ID!): Boolean!
  unlikePost(id: ID!): Boolean!
  createComment(postId: ID!, body: String!): Comment!
  deleteComment(id: ID!): Boolean!
  repostPost(id: ID!, body: String): Post!
  adminHidePost(postId: ID!): AdminPost!
  adminRestorePost(postId: ID!): AdminPost!
}

extend type Query {
  _entities(representations: [_Any!]!): [_Entity]!
  _service: _Service!
}
